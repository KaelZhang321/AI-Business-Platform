server:
  port: 8080

spring:
  application:
    name: ai-business-server
  # profiles.active 由启动参数指定：-Dspring.profiles.active=dev
  # 本地开发默认在 IDE 或命令行中传入 --spring.profiles.active=dev
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      timeout: 5000

  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  security:
    jwt:
      secret: change_me_super_secret_key_please
      expiration: 86400000
