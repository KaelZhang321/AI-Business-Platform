spring:
  application:
    name: ai-business-server
  cloud:
    nacos:
      # 服务发现
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        enabled: ${NACOS_ENABLED:false}
      # 配置中心
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yml
        enabled: ${NACOS_ENABLED:false}
        shared-configs: ${NACOS_SHARED_CONFIGS:[]}
