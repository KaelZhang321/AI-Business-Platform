# Flowable 工作流引擎 (S4-1)
flowable:
  database-schema-update: true
  async-executor-activate: true
  database-type: ${FLOWABLE_DATABASE_TYPE:}

# Actuator + Prometheus (S4-5)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name:ai-business-server}

# Springdoc / Swagger UI (S5-3)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  group-configs:
    - group: "业务API"
      paths-to-match: /api/v1/**
    - group: "管理API"
      paths-to-match: /actuator/**

