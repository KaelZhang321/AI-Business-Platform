spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
    username: ai_platform
    password: ai_platform_dev
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000
      pool-name: ai-platform-mysql

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_dev

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin_dev

# Flowable 工作流引擎 (S4-1)
flowable:
  database-schema-update: true
  async-executor-activate: true

# Actuator + Prometheus (S4-5)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name:ai-business-server}

# Springdoc / Swagger UI (S5-3)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  group-configs:
    - group: "业务API"
      paths-to-match: /api/v1/**
    - group: "管理API"
      paths-to-match: /actuator/**

logging:
  level:
    com.lzke.ai: DEBUG
    org.springframework.web: INFO
    org.flowable: INFO

app:
  security:
    jwt:
      secret: dev_change_me_super_secret_key_1234567890
      expiration: 86400000
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin_dev
    bucket: ai-platform-docs
  clickhouse:
    url: jdbc:clickhouse://localhost:8123/ai_platform_logs
    username: default
    password: ""
  feature-flags:
    global-enabled: true
    flags:
      semantic-cache:
        enabled: false
        description: "AI网关语义缓存（向量相似度命中直接返回）"
      spring-ai:
        enabled: false
        description: "Spring AI 框架集成"
      graphrag:
        enabled: true
        description: "GraphRAG 三路融合检索"
