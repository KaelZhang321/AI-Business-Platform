spring:
  main:
    allow-circular-references: true
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        import-check:
          enabled: false
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:ai-platform-postgres}:5432/${POSTGRES_DB:ai_platform}?sslmode=disable
    username: ${POSTGRES_USER:ai_platform}
    password: ${POSTGRES_PASSWORD:ai_platform_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000
      pool-name: ai-platform-pg

  data:
    redis:
      host: ${REDIS_HOST:ai-platform-redis}
      port: 6379
      password: ${REDIS_PASSWORD:redis_dev}

  rabbitmq:
    host: ${RABBITMQ_HOST:ai-platform-rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin_dev}

flowable:
  database-schema-update: true
  async-executor-activate: true
  database-type: postgres

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    nacos:
      enabled: false
    discovery:
      enabled: false
    nacosConfig:
      enabled: false
    nacosDiscovery:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name:ai-business-server}

logging:
  level:
    com.lzke.ai: INFO
    org.springframework.web: INFO
    org.flowable: WARN

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change_me_super_secret_key_please}
      expiration: 86400000
  minio:
    endpoint: http://${MINIO_HOST:ai-platform-minio}:9000
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin_dev}
    bucket: ai-platform-docs
  clickhouse:
    url: jdbc:clickhouse://${CLICKHOUSE_HOST:ai-platform-clickhouse}:8123/${CLICKHOUSE_DB:ai_platform_logs}
    username: ${CLICKHOUSE_USER:default}
    password: ${CLICKHOUSE_PASSWORD:clickhouse_dev}
  feature-flags:
    global-enabled: true
    flags:
      semantic-cache:
        enabled: false
        description: "AI网关语义缓存"
      spring-ai:
        enabled: false
        description: "Spring AI 框架集成"
      graphrag:
        enabled: true
        description: "GraphRAG 三路融合检索"
