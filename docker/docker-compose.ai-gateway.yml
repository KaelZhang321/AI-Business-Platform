services:
  ai-gateway:
    container_name: ai-platform-ai-gateway
    image: ai-platform/ai-gateway:${AI_GATEWAY_IMAGE_TAG:-local}
    build:
      context: ../ai-gateway
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: alibaba-cloud-linux-3-registry.cn-hangzhou.cr.aliyuncs.com/alinux3/python:3.11.1
        PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    env_file:
      - path: ../ai-gateway/.env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /opt/model-cache/huggingface
      TRANSFORMERS_CACHE: /opt/model-cache/huggingface
      XDG_CACHE_HOME: /opt/model-cache
      # 默认把宿主机预置的本地 embedding 模型挂到容器稳定路径，避免容器重建后模型目录丢失。
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/app/BAAI/bge-m3}
    ports:
      - "${AI_GATEWAY_HOST_PORT:-8000}:8000"
    volumes:
      - /data/ai_platform_infra/chroma:/opt/model-cache/.cache/chroma
      # 把仓库内的模型目录直接 bind mount 到容器，确保 /app/BAAI 在重建后依然存在。
      - ../ai-gateway/BAAI:/app/BAAI:ro
      # 把应用日志固定映射回仓库目录，便于宿主机直接查看 app/logs/app.log。
      - ../ai-gateway/app/logs:/app/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

networks:
  default:
    external: true
    name: ai-platform-net
