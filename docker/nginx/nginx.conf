worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ── Gzip 压缩 ────────────────────────────────────────
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 上游服务（Docker 容器名通信）
    upstream ai_gateway {
        server ai-platform-ai-gateway:8000;
    }

    upstream business_server {
        server ai-platform-business-server:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 100m;

        # ── 安全响应头 ─────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── 业务编排层 → Spring Boot ─────────────────────
        location /api/v1/tasks {
            proxy_pass http://business_server;
            include /etc/nginx/proxy-params.conf;
        }
        location /api/v1/knowledge/documents {
            proxy_pass http://business_server;
            include /etc/nginx/proxy-params.conf;
        }
        location /api/v1/audit {
            proxy_pass http://business_server;
            include /etc/nginx/proxy-params.conf;
        }
        location /api/v1/auth {
            proxy_pass http://business_server;
            include /etc/nginx/proxy-params.conf;
        }
        location /api/v1/workflow {
            proxy_pass http://business_server;
            include /etc/nginx/proxy-params.conf;
        }

        # ── AI 网关 → FastAPI（SSE 支持）─────────────────
        location /api {
            proxy_pass http://ai_gateway;
            include /etc/nginx/proxy-sse.conf;
        }
        location /mcp {
            proxy_pass http://ai_gateway;
            include /etc/nginx/proxy-sse.conf;
        }
        location /health {
            proxy_pass http://ai_gateway;
        }

        # ── 前端静态资源（SPA）────────────────────────────
        root /usr/share/nginx/html;

        location / {
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
