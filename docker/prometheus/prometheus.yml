global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # AI网关 (FastAPI + prometheus_client)
  - job_name: "ai-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: ai-gateway

  # 业务编排层 (Spring Boot Actuator + Micrometer)
  - job_name: "business-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: business-server

  # PostgreSQL (可选 — 需部署 postgres_exporter)
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis (可选 — 需部署 redis_exporter)
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
