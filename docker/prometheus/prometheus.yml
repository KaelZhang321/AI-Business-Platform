global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # AI网关 (FastAPI + prometheus_client)
  - job_name: "ai-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: ai-gateway

  # 业务编排层 (Spring Boot Actuator + Micrometer)
  - job_name: "business-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: business-server

  # MySQL Exporter
  - job_name: "mysql"
    static_configs:
      - targets: ["mysqld-exporter:9104"]
        labels:
          service: mysql

  # Redis Exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
